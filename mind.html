<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>✨ AR Pléyades con MindAR ✨</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #info {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 20px;
      font-size: 14px;
      z-index: 100;
      pointer-events: none;
      backdrop-filter: blur(5px);
      border-radius: 40px;
      margin: 0 20px;
    }
    #scan-status {
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      text-align: center;
      background: rgba(0,0,0,0.5);
      color: #ffaa00;
      padding: 8px 15px;
      font-size: 13px;
      z-index: 100;
      font-family: monospace;
      border-radius: 20px;
      margin: 0 20px;
      backdrop-filter: blur(5px);
    }
    .music-btn {
      position: absolute;
      top: 70px;
      right: 20px;
      z-index: 101;
      background: linear-gradient(135deg, #1DB954, #1ed760);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 25px;
      font-size: 13px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .spotify-card {
      position: absolute;
      bottom: 80px;
      left: 20px;
      z-index: 101;
      display: none;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 15px;
    }
    .close-spotify {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      margin-bottom: 8px;
    }
  </style>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

  <div id="scan-status">📷 Esperando detección...</div>

  <button class="music-btn" id="musicBtn">🎵 Música</button>

  <div class="spotify-card" id="spotifyCard">
    <button class="close-spotify" id="closeSpotifyBtn">✕</button>
    <iframe
      src="https://open.spotify.com/embed/track/3DcuuQFpNq7y8MiCjJtNO5?utm_source=generator"
      width="280"
      height="152"
      frameBorder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

  <div id="info">
    🔍 Apunta a tu postal → Aparecerán las Pléyades ✨
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./postal.mind; autoInitialize: true; maxTrack: 1;"
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true; colorManagement: true;"
    device-orientation-permission-ui="enabled: false"
  >
    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Modelo 3D de las Pléyades (M45) -->
      <a-gltf-model
        src="https://ar-models.s3.us-east-2.amazonaws.com/pleyades/pleyades_m45.glb"
        scale="0.5 0.5 0.5"
        position="0 0.2 0"
        rotation="-90 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"
      ></a-gltf-model>

      <!-- Texto flotante -->
      <a-text
        value="✨ PLÉYADES (M45) ✨"
        position="0 1 0"
        align="center"
        scale="1.2 1.2 1.2"
        color="#FFD700"
        background="true"
        background-opacity="0.5"
        font="mozillavr"
      ></a-text>

      <!-- Partículas/estrellas brillantes alrededor -->
      <a-sphere radius="0.05" color="#fff" position="0.3 0.3 0.2" material="emissive: #ffcc88; emissiveIntensity: 0.9"></a-sphere>
      <a-sphere radius="0.04" color="#aaf" position="-0.25 0.4 -0.15" material="emissive: #88aaff; emissiveIntensity: 0.8"></a-sphere>
      <a-sphere radius="0.06" color="#fda" position="0.2 0.6 0.25" material="emissive: #ffaa66; emissiveIntensity: 1"></a-sphere>
      <a-sphere radius="0.03" color="#fff" position="-0.15 0.15 0.4" material="emissive: #ffffff; emissiveIntensity: 0.7"></a-sphere>
      <a-sphere radius="0.05" color="#ddf" position="0.1 -0.1 0.45" material="emissive: #99ccff; emissiveIntensity: 0.8"></a-sphere>
      <a-sphere radius="0.04" color="#fff" position="-0.3 0.25 -0.2" material="emissive: #ffddaa; emissiveIntensity: 0.85"></a-sphere>
      <a-sphere radius="0.035" color="#aaf" position="0.35 -0.05 -0.25" material="emissive: #88aaff; emissiveIntensity: 0.75"></a-sphere>
    </a-entity>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const musicBtn = document.getElementById('musicBtn');
    const spotifyCard = document.getElementById('spotifyCard');
    const closeSpotifyBtn = document.getElementById('closeSpotifyBtn');
    const statusDiv = document.getElementById('scan-status');

    musicBtn.addEventListener('click', () => {
      spotifyCard.style.display = 'block';
      musicBtn.style.display = 'none';
    });

    closeSpotifyBtn.addEventListener('click', () => {
      spotifyCard.style.display = 'none';
      musicBtn.style.display = 'block';
    });

    const scene = document.querySelector('a-scene');

    scene.addEventListener('mindar-image-target-found', (e) => {
      statusDiv.innerHTML = '✅ ¡POSTAL DETECTADA! ✨';
      statusDiv.style.background = 'rgba(0,128,0,0.7)';
      statusDiv.style.color = '#00ff00';
    });

    scene.addEventListener('mindar-image-target-lost', (e) => {
      statusDiv.innerHTML = '🔍 Buscando postal...';
      statusDiv.style.background = 'rgba(0,0,0,0.5)';
      statusDiv.style.color = '#ffaa00';
    });
  </script>
</body>
</html>
